schema_version: 1

context:
  name: where
  version: 1.0.2

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/where-${{ version }}.zip
  sha256: 325ef3a492a26189a47819f7375bc146887d39edd36fce132e86514334803fb1

build:
  number: 3
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv
  python:
    entry_points:
      - where = where.__main__:main

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - itermate ==1.0.2
    - python >=${{ python_min }}

tests:
  - python:
      imports:
        - where
      python_version: ${{ python_min }}.*
  - requirements:
      run:
        - pip
        - python ${{ python_min }}.*
    script:
      - pip check
      - where --help

about:
  license: MIT
  license_file: LICENSE
  summary: Works like linux which or windows where for python.
  description: |
    Locates absolute file paths like the Windows where or the Linux which
    utility. Makes use of the PATH variable and the current directory.
  homepage: https://github.com/hweickert/where
  repository: https://github.com/hweickert/where
  documentation: https://github.com/hweickert/where

extra:
  recipe-maintainers:
    - jan-janssen
